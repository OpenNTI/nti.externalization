[tox]
envlist =
   py311,py312,py313,py314,py314-pure,py314t,py315t,coverage,docs,lint

[testenv]
usedevelop = true
commands =
    zope-testrunner --test-path=src []
extras =
    test
    zodb
    orjson
setenv =
    pure: PURE_PYTHON=1
    ZOPE_INTERFACE_STRICT_IRO=1
    PYTHON_GIL=0

[testenv:coverage]
usedevelop = true
basepython =
    python3
commands =
    coverage run -m zope.testrunner --test-path=src
    coverage html -i
    coverage report --fail-under=100
deps =
    coverage
setenv =
    PURE_PYTHON = 1

[testenv:py314]
extras =
    test

[testenv:py314t]
extras =
    test
    zodb

[testenv:py315t]
extras =
    test
    zodb

[testenv:docs]
commands =
    sphinx-build -b html -d docs/_build/doctrees docs docs/_build/html
    # XXX: Fix doctests
    #python -m sphinx -b doctest -d docs/_build/doctrees docs docs/_build/doctests
extras =
    docs
    orjson
setenv =
    PURE_PYTHON = 1

[testenv:lint]
basepython = python3
extras =
    lint
    test
setenv =
    PURE_PYTHON=1
commands =
    pylint --limit-inference-results=1 --rcfile=.pylintrc nti.externalization -f colorized
